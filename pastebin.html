<!DOCTYPE html>
<html>
<head>
<title>pastebin</title>
</head>
<body>

<textarea id="pasteInput" rows="10" cols="60"></textarea>
<br>
<button id="pasteBtn">paste</button>
<br>
<select id="historyList" disabled></select>

<script>
// Change this to wherever nginx is actually serving the pastebin backend.
// This is now a cross-origin request (see nginx.conf's two server blocks +
// the CORS header app.py adds on GET), since encryption/decryption needs to
// happen here on the frontend origin, not the API origin.
const BACKEND_URL = 'http://127.0.0.1:8000/';

const STORAGE_KEY = 'pastebin_history';

// ---- crypto helpers -------------------------------------------------------
// AES-256-GCM, generated fresh per paste. The key never leaves this tab
// except as part of the URL fragment (after #), which browsers never send
// to any server -- see view.html for the decrypt side.

function b64urlEncode(buf) {
  const bytes = new Uint8Array(buf);
  let bin = '';
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function encryptPaste(plaintext) {
  const key = await crypto.subtle.generateKey({ name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ciphertext = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv },
    key,
    new TextEncoder().encode(plaintext)
  );

  // wire format the server stores: iv (12 bytes) || ciphertext+tag
  const payload = new Uint8Array(iv.length + ciphertext.byteLength);
  payload.set(iv, 0);
  payload.set(new Uint8Array(ciphertext), iv.length);

  const rawKey = await crypto.subtle.exportKey('raw', key);
  return { payload, keyStr: b64urlEncode(rawKey) };
}

// ---- history (unchanged) --------------------------------------------------

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch (e) {
    return [];
  }
}

function saveHistory(history) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function renderHistory() {
  const select = document.getElementById('historyList');
  select.innerHTML = '';
  const history = loadHistory();
  for (let i = history.length - 1; i >= 0; i--) {
    const entry = history[i];
    const option = document.createElement('option');
    option.value = entry.url;
    option.textContent = entry.createdAt + ' - ' + entry.url;
    select.appendChild(option);
  }
}

document.getElementById('pasteBtn').addEventListener('click', async function () {
  const textarea = document.getElementById('pasteInput');
  const content = textarea.value;
  if (!content) {
    return;
  }

  const { payload, keyStr } = await encryptPaste(content);

  let response;
  try {
    response = await fetch(BACKEND_URL, {
      method: 'POST',
      body: payload
    });
  } catch (err) {
    alert('Request failed: ' + err.message);
    return;
  }

  const text = await response.text();

  if (!response.ok) {
    alert('Error ' + response.status + ': ' + text);
    return;
  }

  // Server returns "<origin>/<id>"; the key is appended here, client-side
  // only, and is never sent in any request.
  const url = text.trim() + '#' + keyStr;
  const history = loadHistory();
  history.push({ url: url, createdAt: new Date().toISOString() });
  saveHistory(history);
  renderHistory();
  textarea.value = '';
});

renderHistory();
</script>

</body>
</html>

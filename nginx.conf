# /etc/nginx/sites-available/pastebin
# ln -s to /etc/nginx/sites-enabled/pastebin, then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name p.example.com;

    # Reject oversized bodies before they even reach Flask.
    # Keep this in sync with MAX_BYTES in app.py.
    client_max_body_size 1m;

    # Basic abuse throttling (no auth on this service at all).
    limit_req zone=pastebin_zone burst=10 nodelay;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


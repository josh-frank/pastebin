# /etc/nginx/sites-available/pastebin
# ln -s to /etc/nginx/sites-enabled/pastebin, then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name p.example.com;

    # Reject oversized bodies before they even reach Flask.
    # Keep this in sync with MAX_BYTES in app.py (ciphertext is ~28 bytes
    # larger than the 1 MiB plaintext cap, for the IV + GCM tag).
    client_max_body_size 1m;

    # Basic abuse throttling (no auth on this service at all).
    limit_req zone=pastebin_zone burst=10 nodelay;

    # CORS (Access-Control-Allow-Origin) for GET /<id> is set by app.py
    # itself, not here -- it needs to reflect PASTEBIN_FRONTEND_ORIGIN,
    # which nginx has no easy way to know about.

    location ~ ^/[a-zA-Z0-9]$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_hide_header Content-Type;
        add_header Content-Type "text/plain; charset=utf-8" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    location / {
        limit_req zone=pastebin_zone burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name paste.example.com;

    root /var/www/pastebin;
    index pastebin.html;

    # Paste links look like /<id>#<key> (see app.py's create_paste response).
    # There's no file at that path, so fall back to view.html, which reads
    # the id from location.pathname and the key from location.hash (never
    # sent to any server) and decrypts client-side.
    location / {
        try_files $uri $uri/ /view.html;
    }
}

